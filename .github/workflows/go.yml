name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    # run inside the official golang container to ensure a clean, matching toolchain
    container:
      image: golang:1.25
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # make common env available to all steps (fixes cache step and enables fast tests)
    env:
      GOMODCACHE: ${{ github.workspace }}/.gocache
      GON_FAST_TEST: 1
      # Opt into running GitHub Actions on Node.js 24 now (prevents deprecation warnings
      # and avoids surprises when GitHub changes the default runtime).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      matrix:
        # match the go directive in go.mod to avoid toolchain mismatches
        go-version: [1.25]

    steps:
      - uses: actions/checkout@v5
      - name: Prepare module files
        run: |
          # ensure module files are present; repo has no external deps but this normalises state
          go mod tidy
          go mod download
      - name: Debug Go environment (detailed)
        run: |
          echo "--- go version & env ---"
          go version
          go env GOROOT GOPATH GOMOD GOMODCACHE GOCACHE
          echo "--- GOROOT/pkg ---"
          ls -la "$(go env GOROOT)/pkg" || true
          echo "--- GOCACHE ---"
          ls -la "$(go env GOCACHE)" || true
          echo "--- GOMODCACHE ---"
          ls -la "${{ env.GOMODCACHE }}" || true
      - name: Aggressive clean of caches
        run: |
          # remove any stale compiled objects that might be incompatible with the runner toolchain
          set -e
          echo "Cleaning go caches and pkg directories..."
          go clean -cache -modcache -testcache || true
          rm -rf "$(go env GOCACHE)" || true
          # clear module download cache folder we create for CI
          rm -rf "${{ env.GOMODCACHE }}" || true
          # show remaining cache state
          echo "After cleanup:"; go env GOCACHE GOMODCACHE; ls -la "$(go env GOROOT)/pkg" || true
      - name: Run unit tests (race)
        run: |
          go test ./... -v -race
      - name: Run golangci-lint (official action)
        uses: golangci/golangci-lint-action@v5
        with:
          version: v1.59.0
          args: --timeout=5m
