name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    # make common env available to all steps (fixes cache step and enables fast tests)
    env:
      GOMODCACHE: ${{ github.workspace }}/.gocache
      GON_FAST_TEST: 1

    strategy:
      matrix:
        # match the go directive in go.mod to avoid toolchain mismatches
        go-version: [1.25]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-
      - name: Debug Go environment
        run: |
          go version
          go env GOROOT GOPATH GOMOD GOMODCACHE
          ls -la ${{ env.GOMODCACHE }} || true
      - name: Run unit tests (race)
        run: |
          go test ./... -v -race
      - name: Run linters (golangci-lint action)
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.59.0
          args: --timeout=5m
